-- /etc/registries.cfg — configured package registries.
--
-- Add entries by hand or via `pkg registry add <name> <url>`. The OCOS
-- pkg client fetches `<url>/index.cfg` to discover packages and then
-- `<url>/<id>/<version>/manifest.cfg` + declared files for install.
--
-- The default `ocos-official` registry is the OCOS repository's own
-- dist/registry/ tree served via raw.githubusercontent.com. It hosts
-- the first-party packs (ocos.robot, …); remove it if you only want
-- to use private mirrors, or add more entries below — the first one
-- that knows about a requested id wins.
return {
  { name = "ocos-official",
    url  = "https://raw.githubusercontent.com/AlexMelanFromRingo/OCOS/main/dist/registry" },
}
