-- /etc/security.cfg — kernel security policy.
--
-- enforce=true means cap.check actually denies; false means it only
-- logs. We default to FALSE so a fresh install boots straight into a
-- root shell without surprises. After useradd creates the first
-- account, flip this to true (or pkg install a hardened profile) so
-- subsequent logins follow the limited-cap regime.
return {
  enforce = false,
  default_user = "root",
}
