-- /etc/security.cfg — kernel security policy.
--
-- `enforce` switches cap.check from log-only to actually denying. Boots
-- with enforcement off so a freshly-installed system can be configured
-- before the screws tighten; flip to true via `pkg install` of a hardened
-- profile, or by hand-editing this file.
return {
  enforce = false,
  default_user = "root",
}
