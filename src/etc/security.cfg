-- /etc/security.cfg — kernel security policy.
--
-- enforce = true means cap.check actually denies; false means it only
-- logs. We default to true so user accounts have real teeth out of the
-- box. A first boot still ends in a privileged shell because /etc/passwd
-- is empty (sessiond drops to caps={"*"} when users.empty() is true);
-- as soon as `useradd <name>` runs, the limited-cap regime applies to
-- subsequent logins.
return {
  enforce = true,
  default_user = "root",
}
