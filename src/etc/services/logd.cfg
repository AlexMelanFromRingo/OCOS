return {
  id          = "logd",
  description = "Kernel log persister",
  exec        = "/sys/svc/logd.lua",
  -- Single-disk installs put /var/log/dmesg.log on the boot fs; the /mnt
  -- variant covers multi-disk setups where the OS is on the boot disk and
  -- logs go to a side disk.
  caps        = { "syscall:write:/var/log/*", "syscall:write:/mnt/*/var/log/*" },
  restart     = "on_failure",
  autostart   = true,
}
