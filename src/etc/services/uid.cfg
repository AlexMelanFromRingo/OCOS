return {
  id          = "uid",
  description = "GUI compositor + desktop shell",
  exec        = "/sys/svc/uid.lua",
  -- uid asks sessiond to pause its shell on startup, so it has to come up
  -- after sessiond is already running and subscribed to svc.suspend.*.
  after       = { "logd", "sessiond" },
  caps        = { "*" },
  -- one_shot: if compositor.new fails (e.g., no GPU resolution) we exit
  -- cleanly rather than thrashing the supervisor with restart attempts.
  -- The TTY shell stays usable; `svc start uid` re-tries on demand.
  restart     = "one_shot",
  -- Default-on so a fresh install boots straight into the desktop.
  -- Console-only machines should set autostart=false; the user can
  -- always do `svc start uid` from the shell when they're ready.
  autostart   = true,
}
