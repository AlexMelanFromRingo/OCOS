return {
  id          = "uid",
  description = "GUI compositor + desktop shell",
  exec        = "/sys/svc/uid.lua",
  after       = { "logd" },
  caps        = { "*" },
  -- one_shot: a missing GPU / failed compositor shouldn't make the
  -- supervisor thrash on restart. The TTY shell stays usable;
  -- `svc start uid` re-tries on demand.
  restart     = "one_shot",
  -- Disabled by default. The 0.2.0 race between sessiond's banner and
  -- uid's splash made fresh installs unreadable. Run `svc start uid`
  -- from the TTY shell when you actually want the desktop.
  autostart   = false,
}
